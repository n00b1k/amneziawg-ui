services:
    amneziawg-ui:
        container_name: amneziawg-ui
        ports:
            - 5000:5000
            - 51820:51820/udp
        volumes:
            - /opt/amneziawg-ui:/etc/amnezia
            - /opt/amneziawg-ui/certs:/app/certs
        environment:
            - ADMIN_USERNAME=user
            - ADMIN_PASSWORD_HASH='$2b$12$p4YhOrFCPZGwcZXj92aiAejI8sksU46lQiwlJPzSzKvh7moxju3v2'
            - DEFAULT_MTU=1420
            - DEFAULT_SUBNET=192.168.99.0/24
            - DEFAULT_PORT=51820
            - DEFAULT_DNS=1.1.1.1,9.9.9.9
        cap_add:
            - NET_ADMIN
            - SYS_MODULE
        sysctls:
            - net.ipv4.ip_forward=1
            - net.ipv4.conf.all.src_valid_mark=1
        devices:
            - /dev/net/tun
        restart: unless-stopped
        image: n00b1k/amneziawg-ui:latest