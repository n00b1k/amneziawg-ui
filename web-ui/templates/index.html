<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmneziaWG Web UI</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <script src="/static/cloudflare/socket.io.js"></script>
    <script src="/static/cloudflare/qrcode.min.js"></script>
    <!-- tailwindcss -->
    <link rel="stylesheet" href="/static/css/tailwind.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
      <!-- Верхняя панель: заголовок и профиль в одной строке -->
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">AmneziaWG Web UI</h1>

        <!-- Выпадающий список профиля -->
        <div class="relative">
          <button
            id="profileButton"
            class="bg-purple-500 text-white border border-white-300 px-4 py-2 rounded text-sm font-medium transition duration-200 hover:bg-purple-800 flex items-center space-x-2 shadow-sm"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-user-icon lucide-user"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>{{ current_user.username if current_user.username else 'User' }}</span>
            <svg class="w-6 h-6 ml-2 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          <!-- Выпадающее меню -->
          <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded shadow-xl z-50 border border-gray-100">
            <a href="/change-password" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 transition duration-200 flex items-center space-x-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v-2l4.257-4.257A6 6 0 0119 9h-2zM11 3h.01M21 21l-5-5"></path>
              </svg>
              <span>Change Password</span>
            </a>
            <div class="py-2">
              <button onclick="amneziaApp.logout()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition duration-200 flex items-center space-x-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                </svg>
                <span>Logout</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="mb-6 bg-blue-50 border border-blue-200 rounded p-3">
        <div class="flex justify-between items-center">
          <div class="flex items-center space-x-6">
            <div>
              <span class="text-sm font-medium text-blue-800">Public IP: </span>
              <span id="publicIp" class="text-sm text-blue-600">Detecting...</span>
            </div>
            <!-- New System Status Box -->
            <div class="flex items-center space-x-2 bg-white rounded-md px-3 py-1">
              <span class="text-sm font-medium text-gray-700">System Status:</span>
              <span id="statusIndicator" class="inline-block w-3 h-3 rounded-full bg-gray-400"></span>
              <span id="status" class="text-sm text-gray-600">Connecting...</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button id="refreshIpBtn" class="bg-yellow-500 text-white px-3 py-1.5 rounded text-sm font-medium transition-all duration-200 shadow hover:bg-yellow-800 flex items-center">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-4 h-4 mr-1">
                <path
                  fill-rule="evenodd"
                  d="M12 5.25c1.213 0 2.415.046 3.605.135a3.256 3.256 0 0 1 3.01 3.01c.044.583.077 1.17.1 1.759L17.03 8.47a.75.75 0 1 0-1.06 1.06l3 3a.75.75 0 0 0 1.06 0l3-3a.75.75 0 0 0-1.06-1.06l-1.752 1.751c-.023-.65-.06-1.296-.108-1.939a4.756 4.756 0 0 0-4.392-4.392 49.422 49.422 0 0 0-7.436 0A4.756 4.756 0 0 0 3.89 8.282c-.017.224-.033.447-.046.672a.75.75 0 1 0 1.497.092c.013-.217.028-.434.044-.651a3.256 3.256 0 0 1 3.01-3.01c1.19-.09 2.392-.135 3.605-.135Zm-6.97 6.22a.75.75 0 0 0-1.06 0l-3 3a.75.75 0 1 0 1.06 1.06l1.752-1.751c.023.65.06 1.296.108 1.939a4.756 4.756 0 0 0 4.392 4.392 49.413 49.413 0 0 0 7.436 0 4.756 4.756 0 0 0 4.392-4.392c.017-.223.032-.447.046-.672a.75.75 0 0 0-1.497-.092c-.013.217-.028.434-.044.651a3.256 3.256 0 0 1-3.01 3.01 47.953 47.953 0 0 1-7.21 0 3.256 3.256 0 0 1-3.01-3.01 47.759 47.759 0 0 1-.1-1.759L6.97 15.53a.75.75 0 0 0 1.06-1.06l-3-3Z"
                  clip-rule="evenodd"
                />
              </svg>
              <span>Refresh</span>
            </button>
            <a href="/create-server" class="bg-blue-500 text-white px-4 py-2 rounded text-sm font-medium hover:bg-blue-800 transition duration-200">New Server</a>
          </div>
        </div>
      </div>

      <!-- Servers List -->
      <div id="serversList" class="space-y-4">
        <div class="text-center py-8 text-gray-500">Loading servers...</div>
      </div>

      <!-- Copyright Footer -->
      <div class="mt-8 text-center text-gray-400 text-sm">
        <a href="https://github.com/n00b1k/amneziawg-ui" target="_blank" rel="noopener noreferrer" class="hover:text-gray-600 transition duration-200"> © AmneziaWG Web UI. Version {{ version }} </a>
      </div>
    </div>

    <script>
      // Toggle profile dropdown
      const profileButton = document.getElementById("profileButton");
      const profileDropdown = document.getElementById("profileDropdown");

      if (profileButton && profileDropdown) {
        profileButton.addEventListener("click", (e) => {
          e.stopPropagation();
          profileDropdown.classList.toggle("hidden");
        });

        // Close dropdown when clicking outside
        document.addEventListener("click", (e) => {
          if (!profileButton.contains(e.target) && !profileDropdown.contains(e.target)) {
            profileDropdown.classList.add("hidden");
          }
        });
      }
    </script>
    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
